apiVersion: v1
kind: ConfigMap
metadata:
  name: im-alive-config
  namespace: im-alive
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-svc:5432/im_alive"
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  CORS_ORIGINS: "https://your-domain.com"
  AI_RATE_LIMIT: "10"
  AI_MODEL: "claude-sonnet-4-20250514"
  AI_MAX_TOKENS: "1024"
