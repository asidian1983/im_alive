version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: im-alive-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/im_alive
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_RATE_LIMIT: ${AI_RATE_LIMIT:-10}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - im-alive-net

  db:
    image: postgres:16-alpine
    container_name: im-alive-db
    environment:
      POSTGRES_DB: im_alive
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d im_alive"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - im-alive-net

  redis:
    image: redis:7-alpine
    container_name: im-alive-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - im-alive-net

volumes:
  postgres-data:
  redis-data:

networks:
  im-alive-net:
    driver: bridge
