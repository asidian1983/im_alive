spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/im_alive
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production}
  expiration: 3600000           # 1 hour
  refresh-expiration: 604800000  # 7 days

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"

ai:
  api-key: ${AI_API_KEY:}
  api-url: ${AI_API_URL:https://api.anthropic.com/v1/messages}
  model: ${AI_MODEL:claude-sonnet-4-20250514}
  max-tokens: ${AI_MAX_TOKENS:1024}
  rate-limit: ${AI_RATE_LIMIT:10}  # requests per minute per user
  max-retries: ${AI_MAX_RETRIES:3}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
